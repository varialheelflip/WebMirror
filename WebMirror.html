<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mirror Cam</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
    }

    .wrap {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: rgba(20, 20, 20, 0.75);
      color: #fff;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    button {
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
    }

    button:hover {
      border-color: #666;
    }

    .spacer {
      flex: 1;
    }

    .hint {
      opacity: 0.8;
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      transform: scaleX(1);
    }

    video.mirror {
      transform: scaleX(-1);
    }

    body.fullscreen .wrap {
      grid-template-rows: 1fr;
    }

    body.fullscreen header {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <button id="btnMirror" type="button">镜像：开</button>
      <button id="btnFullscreen" type="button">全屏</button>
      <button id="btnLanguage" type="button">EN</button>
      <div class="spacer"></div>
      <div id="hint" class="hint">
        快捷键：<b>M</b> 镜像 / <b>F</b> 全屏 / <b>Esc</b> 退出全屏
      </div>
    </header>
    <main>
      <video id="video" autoplay playsinline></video>
    </main>
  </div>

  <script>
    (() => {
      const LOCALE_STORAGE_KEY = 'webmirror.locale';
      const translations = {
        zh: {
          htmlLang: 'zh-CN',
          pageTitle: 'Mirror Cam',
          mirrorTitle: '镜像翻转',
          mirrorOn: '镜像：开',
          mirrorOff: '镜像：关',
          fullscreenTitle: '全屏',
          fullscreenEnter: '全屏',
          fullscreenExit: '退出全屏',
          languageButton: '中文',
          languageTitle: '切换语言',
          hintHtml: '快捷键：<b>M</b> 镜像 / <b>F</b> 全屏 / <b>L</b> 语言 / <b>Esc</b> 退出全屏',
          unsupportedBrowser: '当前浏览器不支持摄像头 API，请使用最新版 Edge 或 Chrome。',
          cameraOpenError: '无法打开摄像头：\n',
          resolutionLabel: '摄像头分辨率:'
        },
        en: {
          htmlLang: 'en',
          pageTitle: 'Mirror Cam',
          mirrorTitle: 'Toggle mirror',
          mirrorOn: 'Mirror: On',
          mirrorOff: 'Mirror: Off',
          fullscreenTitle: 'Fullscreen',
          fullscreenEnter: 'Fullscreen',
          fullscreenExit: 'Exit Fullscreen',
          languageButton: 'EN',
          languageTitle: 'Toggle language',
          hintHtml: 'Hotkeys: <b>M</b> Mirror / <b>F</b> Fullscreen / <b>L</b> Language / <b>Esc</b> Exit fullscreen',
          unsupportedBrowser: 'Your browser does not support the camera API. Please use the latest Edge or Chrome.',
          cameraOpenError: 'Unable to open the camera:\n',
          resolutionLabel: 'Camera resolution:'
        }
      };

      const video = document.getElementById('video');
      const btnMirror = document.getElementById('btnMirror');
      const btnFullscreen = document.getElementById('btnFullscreen');
      const btnLanguage = document.getElementById('btnLanguage');
      const hint = document.getElementById('hint');

      let currentStream = null;
      let isMirror = true;
      let currentLocale = detectInitialLocale();

      function getSavedLocale() {
        try {
          return localStorage.getItem(LOCALE_STORAGE_KEY);
        } catch {
          return null;
        }
      }

      function saveLocale(locale) {
        try {
          localStorage.setItem(LOCALE_STORAGE_KEY, locale);
        } catch {
          // Ignore storage failures and keep the current session locale only.
        }
      }

      function detectInitialLocale() {
        const savedLocale = getSavedLocale();
        if (savedLocale && translations[savedLocale]) {
          return savedLocale;
        }

        const languages = navigator.languages && navigator.languages.length
          ? navigator.languages
          : [navigator.language || 'en'];

        return languages.some(language => String(language).toLowerCase().startsWith('zh'))
          ? 'zh'
          : 'en';
      }

      function t(key) {
        return translations[currentLocale][key];
      }

      function updateTexts() {
        document.documentElement.lang = t('htmlLang');
        document.title = t('pageTitle');
        btnMirror.title = t('mirrorTitle');
        btnMirror.textContent = isMirror ? t('mirrorOn') : t('mirrorOff');
        btnFullscreen.title = t('fullscreenTitle');
        btnFullscreen.textContent = document.fullscreenElement ? t('fullscreenExit') : t('fullscreenEnter');
        btnLanguage.textContent = t('languageButton');
        btnLanguage.title = t('languageTitle');
        hint.innerHTML = t('hintHtml');
      }

      function toggleLocale() {
        currentLocale = currentLocale === 'zh' ? 'en' : 'zh';
        saveLocale(currentLocale);
        updateTexts();
      }

      function setMirror(on) {
        isMirror = on;
        video.classList.toggle('mirror', isMirror);
        updateTexts();
      }

      function getActiveTrack() {
        return currentStream ? currentStream.getVideoTracks()[0] || null : null;
      }

      async function stopStream() {
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
          currentStream = null;
        }
        video.srcObject = null;
      }

      async function startStream() {
        await stopStream();

        const constraints = {
          video: {
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 30 }
          },
          audio: false
        };

        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          currentStream = stream;
          video.srcObject = stream;
          await video.play().catch(() => {});

          video.onloadedmetadata = () => {
            console.log(t('resolutionLabel'), `${video.videoWidth}x${video.videoHeight}`);
          };
        } catch (err) {
          console.error(err);
          alert(
            t('cameraOpenError') +
            (err && err.name ? `${err.name}: ` : '') +
            (err && err.message ? err.message : err)
          );
        }
      }

      async function init() {
        updateTexts();

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert(t('unsupportedBrowser'));
          return;
        }

        setMirror(true);
        await startStream();
      }

      btnMirror.addEventListener('click', () => setMirror(!isMirror));
      btnLanguage.addEventListener('click', toggleLocale);

      btnFullscreen.addEventListener('click', async () => {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen().catch(() => {});
        } else {
          await document.exitFullscreen().catch(() => {});
        }
      });

      document.addEventListener('fullscreenchange', () => {
        document.body.classList.toggle('fullscreen', !!document.fullscreenElement);
        updateTexts();
      });

      window.addEventListener('keydown', event => {
        if (
          event.target &&
          (event.target.tagName === 'INPUT' || event.target.isContentEditable)
        ) {
          return;
        }

        const key = event.key.toLowerCase();
        if (key === 'm') setMirror(!isMirror);
        if (key === 'f') btnFullscreen.click();
        if (key === 'l') toggleLocale();
      });

      if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
        navigator.mediaDevices.addEventListener('devicechange', async () => {
          if (!getActiveTrack()) {
            await startStream();
          }
        });
      }

      window.addEventListener('beforeunload', stopStream);

      init();
    })();
  </script>
</body>
</html>
