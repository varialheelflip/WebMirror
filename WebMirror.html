<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mirror Cam</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
    }

    .wrap {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: rgba(20, 20, 20, 0.75);
      color: #fff;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    button {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      border-color: #666;
    }

    .spacer {
      flex: 1;
    }

    .hint {
      opacity: 0.8;
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      transform: scaleX(1);
    }

    video.mirror {
      transform: scaleX(-1);
    }

    body.fullscreen .wrap {
      grid-template-rows: 1fr;
    }

    body.fullscreen header {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <button id="btnMirror" title="镜像翻转">镜像：开</button>
      <button id="btnFullscreen" title="全屏">全屏</button>
      <div class="spacer"></div>
      <div class="hint">
        快捷键：<b>M</b> 镜像 / <b>F</b> 全屏 / <b>Esc</b> 退出全屏
      </div>
    </header>
    <main>
      <video id="video" autoplay playsinline></video>
    </main>
  </div>

  <script>
    (() => {
      const video = document.getElementById('video');
      const btnMirror = document.getElementById('btnMirror');
      const btnFullscreen = document.getElementById('btnFullscreen');

      let currentStream = null;
      let isMirror = true;

      function setMirror(on) {
        isMirror = on;
        video.classList.toggle('mirror', isMirror);
        btnMirror.textContent = `镜像：${isMirror ? '开' : '关'}`;
      }

      function getActiveTrack() {
        return currentStream ? currentStream.getVideoTracks()[0] || null : null;
      }

      async function stopStream() {
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
          currentStream = null;
        }
        video.srcObject = null;
      }

      async function startStream() {
        await stopStream();

        const constraints = {
          video: {
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 30 }
          },
          audio: false
        };

        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          currentStream = stream;
          video.srcObject = stream;
          await video.play().catch(() => {});

          video.onloadedmetadata = () => {
            console.log('Camera resolution:', `${video.videoWidth}x${video.videoHeight}`);
          };
        } catch (err) {
          console.error(err);
          alert(
            '无法打开摄像头：\n' +
            (err && err.name ? `${err.name}: ` : '') +
            (err && err.message ? err.message : err)
          );
        }
      }

      async function init() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert('当前浏览器不支持摄像头 API，请使用最新版 Edge 或 Chrome。');
          return;
        }

        setMirror(true);
        await startStream();
      }

      btnMirror.addEventListener('click', () => setMirror(!isMirror));

      btnFullscreen.addEventListener('click', async () => {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen().catch(() => {});
        } else {
          await document.exitFullscreen().catch(() => {});
        }
      });

      document.addEventListener('fullscreenchange', () => {
        document.body.classList.toggle('fullscreen', !!document.fullscreenElement);
        btnFullscreen.textContent = document.fullscreenElement ? '退出全屏' : '全屏';
      });

      window.addEventListener('keydown', event => {
        if (
          event.target &&
          (event.target.tagName === 'INPUT' || event.target.isContentEditable)
        ) {
          return;
        }

        const key = event.key.toLowerCase();
        if (key === 'm') setMirror(!isMirror);
        if (key === 'f') btnFullscreen.click();
      });

      if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
        navigator.mediaDevices.addEventListener('devicechange', async () => {
          if (!getActiveTrack()) {
            await startStream();
          }
        });
      }

      window.addEventListener('beforeunload', stopStream);

      init();
    })();
  </script>
</body>
</html>
