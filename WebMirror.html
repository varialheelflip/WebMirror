<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mirror Cam</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
    }
    .wrap {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: rgba(20,20,20,0.75);
      color: #fff;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    select, button {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover, select:hover { border-color: #666; }
    .spacer { flex: 1; }
    .hint { opacity: 0.8; font-size: 12px; white-space: nowrap; }

    main {
      position: relative;
      height: 100%;
      width: 100%;
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      transform: scaleX(1);
    }
    video.mirror { transform: scaleX(-1); }

    /* 全屏时隐藏顶部栏（移动鼠标到顶部再显示也可扩展，这里做简单版） */
    body.fullscreen header { opacity: 0.15; }
    body.fullscreen header:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <select id="cameraSelect" title="选择摄像头"></select>
      <button id="btnMirror" title="镜像翻转">镜像：开</button>
      <button id="btnFullscreen" title="全屏">全屏</button>
      <button id="btnReload" title="重新枚举设备">刷新设备</button>
      <div class="spacer"></div>
      <div class="hint">
        快捷键：<b>M</b> 镜像 / <b>F</b> 全屏 / <b>Esc</b> 退出全屏
      </div>
    </header>
    <main>
      <video id="video" autoplay playsinline></video>
    </main>
  </div>

<script>
(() => {
  const video = document.getElementById('video');
  const cameraSelect = document.getElementById('cameraSelect');
  const btnMirror = document.getElementById('btnMirror');
  const btnFullscreen = document.getElementById('btnFullscreen');
  const btnReload = document.getElementById('btnReload');

  let currentStream = null;
  let isMirror = true;

  function setMirror(on) {
    isMirror = on;
    video.classList.toggle('mirror', isMirror);
    btnMirror.textContent = `镜像：${isMirror ? '开' : '关'}`;
  }

  async function stopStream() {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    video.srcObject = null;
  }

  async function startStream(deviceId) {
    await stopStream();

    const constraints = {
      video: {
        deviceId: deviceId ? { exact: deviceId } : undefined,
        width: { ideal: 3840 },
        height: { ideal: 2160 },
        frameRate: { ideal: 30 }
      },
      audio: false
    };
    try {
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      currentStream = stream;
      video.srcObject = stream;
      await video.play().catch(() => {});
      // 启动成功后再枚举一次（有些浏览器需要先授权才能拿到设备名）
      video.onloadedmetadata = () => {
        console.log(
          "Camera resolution:",
          video.videoWidth + "x" + video.videoHeight
        );
      };
      await populateCameras(true);
    } catch (err) {
      console.error(err);
      alert(
        '无法打开摄像头：\n' +
        (err && err.name ? `${err.name}: ` : '') +
        (err && err.message ? err.message : err)
      );
    }
  }

  async function populateCameras(keepSelection = false) {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');

    const prev = cameraSelect.value;
    cameraSelect.innerHTML = '';

    if (cams.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = '未发现摄像头';
      cameraSelect.appendChild(opt);
      cameraSelect.disabled = true;
      return;
    }

    cameraSelect.disabled = false;

    cams.forEach((cam, idx) => {
      const opt = document.createElement('option');
      opt.value = cam.deviceId;
      opt.textContent = cam.label || `摄像头 ${idx + 1}`;
      cameraSelect.appendChild(opt);
    });

    if (keepSelection && prev) {
      // 如果之前选的还存在就保留
      const stillExists = [...cameraSelect.options].some(o => o.value === prev);
      if (stillExists) cameraSelect.value = prev;
    }
  }

  async function init() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('当前浏览器不支持摄像头 API，请用最新版 Edge/Chrome。');
      return;
    }

    setMirror(true);

    // 先尝试枚举（可能拿不到 label，但不影响）
    await populateCameras();

    // 默认启动：优先用当前选择，否则用默认摄像头
    const initialId = cameraSelect.value || null;
    await startStream(initialId);
  }

  // UI events
  cameraSelect.addEventListener('change', async () => {
    await startStream(cameraSelect.value);
  });

  btnMirror.addEventListener('click', () => setMirror(!isMirror));

  btnFullscreen.addEventListener('click', async () => {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen().catch(() => {});
    } else {
      await document.exitFullscreen().catch(() => {});
    }
  });

  btnReload.addEventListener('click', async () => {
    await populateCameras(true);
  });

  document.addEventListener('fullscreenchange', () => {
    document.body.classList.toggle('fullscreen', !!document.fullscreenElement);
    btnFullscreen.textContent = document.fullscreenElement ? '退出全屏' : '全屏';
  });

  // hotkeys
  window.addEventListener('keydown', async (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.isContentEditable)) return;
    const k = e.key.toLowerCase();
    if (k === 'm') setMirror(!isMirror);
    if (k === 'f') btnFullscreen.click();
  });

  // 当设备变动（插拔摄像头）时自动刷新列表
  if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
    navigator.mediaDevices.addEventListener('devicechange', async () => {
      await populateCameras(true);
    });
  }

  // 清理
  window.addEventListener('beforeunload', stopStream);

  init();
})();
</script>
</body>
</html>
